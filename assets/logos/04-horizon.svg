<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- HORIZON: a V whose blades are STRATIFIED — three parallel
       diagonals on each side, suggesting time layers / horizons
       compounding into a single point. Blue accent at the V tip is
       the "present moment" from which all horizons radiate. -->
  <g fill="#ffffff">
    <!-- Left blade — three parallel slashes -->
    <path d="M 14 16 L 22 16 L 50 88 L 46 88 Z"/>
    <path d="M 24 22 L 30 22 L 50 70 L 47 70 Z"/>
    <path d="M 32 28 L 36 28 L 49 56 L 47 56 Z"/>
    <!-- Right blade — three parallel slashes -->
    <path d="M 78 16 L 86 16 L 54 88 L 50 88 Z"/>
    <path d="M 70 22 L 76 22 L 53 70 L 50 70 Z"/>
    <path d="M 64 28 L 68 28 L 53 56 L 51 56 Z"/>
  </g>
  <!-- Blue brand accent at the V tip — the present, the now -->
  <path d="M 46 78 L 54 78 L 50 92 Z" fill="#2563EB"/>
</svg>
